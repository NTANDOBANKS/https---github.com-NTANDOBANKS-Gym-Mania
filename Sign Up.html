<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Gym Mania</title>


  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <style>
body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
  color: #fff;
  display: flex;
  flex-direction: column;
}

.menu-toggle {
  display: none;
  flex-direction: column;
  cursor: pointer;
  gap: 5px;
  position: absolute;
  top: 38px;
  right: 5%;
  z-index: 1001;
}

.menu-toggle .bar {
  width: 25px;
  height: 3px;
  background-color: white;
  border-radius: 5px;
  transition: all 0.3s ease-in-out;
}


@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}


header {
  padding: 20px 0;
  text-align: center;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(10px);
}

header h1 {
  font-size: 32px;
  letter-spacing: 2px;
  color: #00f2ff;
}


nav ul {
  list-style: none;
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 15px;
}

nav a {
  text-decoration: none;
  color: #fff;
  font-weight: 500;
  position: relative;
  transition: 0.3s ease;
}

nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -5px;
  width: 0%;
  height: 2px;
  background: #00f2ff;
  transition: 0.3s;
}

nav a:hover::after,
nav a.active::after {
  width: 100%;
}

nav a:hover {
  color: #00f2ff;
}


.signup-section {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
}

.signup-container {
  background: rgba(255, 255, 255, 0.05);
  padding: 40px;
  width: 100%;
  max-width: 500px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(0, 242, 255, 0.3);
  animation: fadeInSignup 1s ease-in-out;
}

.signup-container h2 {
  text-align: center;
  margin-bottom: 10px;
  font-weight: 600;
}

.signup-container p {
  text-align: center;
  font-size: 14px;
  margin-bottom: 30px;
  color: #ccc;
}


.signup-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group label {
  margin-bottom: 6px;
  font-size: 14px;
}

.form-group input,
.form-group select {
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 14px;
  transition: 0.3s ease;
}


.form-group input:focus,
.form-group select:focus {
  box-shadow: 0 0 10px #00f2ff;
  transform: scale(1.02);
}

.checkbox-group {
  flex-direction: row;
  align-items: center;
  gap: 10px;
}

.checkbox-group input {
  width: 16px;
  height: 16px;
}

.signup-btn {
  padding: 14px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #00f2ff, #ff00c8);
  color: white;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  transition: 0.4s ease;
}

.signup-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255, 0, 200, 0.6);
}

.login-link {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
}

.login-link a {
  color: #00f2ff;
  text-decoration: none;
  font-weight: 500;
}

.login-link a:hover {
  text-decoration: underline;
}

footer {
  text-align: center;
  padding: 15px;
  background: rgba(0, 0, 0, 0.7);
  font-size: 14px;
}

@keyframes fadeInSignup {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 600px) {
  .signup-container {
    padding: 25px;
  }

  nav ul {
    flex-direction: column;
    gap: 10px;
  }
}

  </style>
</head>

<body>

<header>
  <h1>Gym Mania</h1>

  <nav id="main-nav" aria-label="Main navigation">
    <ul>
      <li><a href="index.html">Home</a></li>
    </ul>
  </nav>
</header>

<main>

  <section class="signup-section">
    <div class="signup-container">

      <h2>Create Your Account</h2>
      <p>Join Gym Mania and start your transformation journey today.</p>

      <form action="register.php" method="post" class="signup-form">

        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" required>
        </div>

      

        <div class="form-group">
          <label for="password">Create Password</label>
          <input type="password" id="password" name="password" minlength="6" required>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" minlength="6" required>
        </div>

        <div class="form-group checkbox-group">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            I agree to the Terms and Conditions
          </label>
        </div>

        <button type="submit" class="signup-btn">Create Account</button>

      </form>

      <p class="login-link">
        Already have an account? <a href="login.html">Login here</a>
      </p>

    </div>
  </section>

</main>

<footer>
  <p> 2026 Gym Mania </p>
</footer>

<script>
  const menuToggle = document.getElementById('mobile-menu-signup');
  const navUl = document.querySelector('#main-nav ul');

  menuToggle.addEventListener('click', () => {
    navUl.classList.toggle('active');
    menuToggle.classList.toggle('active');
  });
</script>

</body>
</html>
